name: Weekly Perception Parity (Golden)

# PR2 Phase B follow-up. Runs the calibration benchmark every Sunday
# against the silver eval set at calibration/eval_set.jsonl. Fails if
# macro F1 drops below 0.75 (calibrated baseline is 0.815). The point
# is to catch perception-layer drift WITHOUT having to run the full
# benchmark in the daily cron (which is on a tighter time budget).
#
# Failure modes this catches:
#   - Anchor rot: someone edits canonical_stories.json's embedding_anchors
#     and accidentally degrades the matcher
#   - Model API change: HuggingFace ships a model update that changes
#     embedding distribution
#   - Eval set additions: silver labels expand and previously-OK matcher
#     starts missing them

on:
  schedule:
    - cron: '0 10 * * 0'  # Sundays 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install runtime deps (sentence-transformers, numpy, regex)
        run: pip install -r requirements.txt

      - name: Cache HF hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-perception-e5-large-v1
          restore-keys: |
            hf-${{ runner.os }}-perception-

      - name: Run parity check (e5-large against silver eval set)
        # Only e5-large here (the production winner per meta-v9.0.x).
        # Adding LaBSE / bge-m3 would balloon the runtime; their
        # baselines are tracked in the committed
        # calibration/benchmark_results.json.
        run: python -m calibration.parity_check --models e5-large --min-macro-f1 0.75

      - name: Summary
        if: always()
        run: |
          if [ -f calibration/benchmark_results.json ]; then
            echo "## Perception parity — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          d = json.load(open('calibration/benchmark_results.json'))
          for name, mres in d['results'].items():
              if 'error' in mres:
                  print(f'- **{name}**: ERROR {mres[\"error\"][:80]}')
                  continue
              floors = mres['per_floor']
              best = max(floors, key=lambda f: floors[f]['macro_f1'])
              f1 = floors[best]['macro_f1']
              print(f'- **{name}** (floor={best}): macro F1 = {f1:.3f}')
          " >> $GITHUB_STEP_SUMMARY
          fi
