name: CI Tests

# Heavier / network-touching checks. These are NOT required by the
# branch ruleset — they run when relevant code changes (or manually)
# but don't gate bot data pushes.
#
# Required checks (validate-meta + unit-tests) live in meta-check.yml
# with no path filter so they always run on bot pushes.

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'feeds.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'feeds.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run e2e on workflow_dispatch or main branch — avoids hammering
    # live feeds on every commit. The daily cron is the real continuous test.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install requests
      - name: E2E smoke test (5-feed live pull)
        run: python tests_e2e.py
