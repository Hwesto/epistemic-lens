name: Daily Epistemic Lens

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC every day
  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip ingest (use existing snapshot/briefings on main). Re-runs analyze/draft against existing data; saves ~10 min and 235 feed pulls.'
        type: boolean
        default: false
      skip_analyze:
        description: 'Skip analyze (LLM call to write analyses). Use when analyses already exist on main and you only want to re-run draft + publish_api.'
        type: boolean
        default: false
      skip_draft:
        description: 'Skip draft (long-form LLM call + thread/carousel template). Use when only publish_api needs to re-run (e.g. to redeploy web/ assets).'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    if: ${{ inputs.skip_ingest != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the bot can rebase before push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache multilingual embedding model (~500MB)
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: paraphrase-multilingual-MiniLM-L12-v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull feeds + embed + cluster
        env:
          MAX_ITEMS: '50'
          MAX_WORKERS: '30'
          PER_HOST_DELAY: '1.0'
          FETCH_TIMEOUT: '20'
        run: python -m pipeline.ingest

      - name: Extract full article text (hybrid — clusters + per-feed coverage)
        env:
          TOP_CLUSTERS: '20'        # top-20 cross-country stories: deep coverage
          MAX_PER_FEED: '3'         # +3 items from EVERY feed: guarantees per-country coverage
          MAX_BODY_CHARS: '4000'
          EXTRACT_WORKERS: '20'
          PER_HOST_DELAY: '1.0'
          EXTRACT_TIMEOUT: '15'
        run: python -m pipeline.extract_full_text

      - name: Deduplicate snapshot
        run: python -m pipeline.dedup

      - name: Daily health snapshot
        run: python -m pipeline.daily_health

      - name: Build per-story briefings
        run: python -m analytical.build_briefing

      - name: Cache translations (cross-lingual pivot)
        uses: actions/cache@v4
        with:
          path: cache/translations
          key: translations-v3-${{ hashFiles('meta_version.json') }}
          restore-keys: |
            translations-v3-

      - name: Translate corpora to English pivot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m analytical.translate

      - name: Compute briefing metrics (Jaccard + bucket-exclusive vocab)
        run: python -m analytical.build_metrics

      - name: Job summary
        if: always()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "snapshots/${DATE}_health.json" ]; then
            python3 - <<PY >> $GITHUB_STEP_SUMMARY
          import json
          d = json.load(open("snapshots/${DATE}_health.json"))
          print(f"# Daily ingest — {d['date']}")
          print()
          print(f"- Feeds: **{d['n_feeds']}**")
          print(f"- Items: **{d['n_items']}**")
          print(f"- Errored feeds: **{d['n_errors']}**")
          print(f"- Stub-only feeds: **{d['n_stub_feeds']}**")
          print(f"- Slow feeds: **{d['n_slow_feeds']}**")
          et = d.get("extraction_totals") or {}
          if any(et.values()):
              print(f"- Full-text extraction: **{et.get('FULL',0)} FULL**, {et.get('PARTIAL',0)} PARTIAL, {et.get('ERROR',0)} ERROR ({d.get('extraction_full_pct',0)}% FULL)")
          if d['bucket_alerts']:
              print()
              print(f"### Bucket alerts ({len(d['bucket_alerts'])})")
              for a in d['bucket_alerts']:
                  if a.get('alert_type') == 'low_extraction':
                      print(f"- **{a['bucket']}**: low_extraction "
                            f"(full={a['full']}/{a['attempted']}={a['full_pct']}%, "
                            f"errors={a['errors']})")
                  else:
                      print(f"- **{a['bucket']}**: {a['now']} "
                            f"(avg7={a['avg7']}, -{a['drop_pct']}%)")
          PY
          fi

      - name: Commit and push snapshot
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add snapshots/ briefings/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          ITEMS=$(python3 -c "import json,sys; d=json.load(open(f'snapshots/{sys.argv[1]}_health.json')); print(d['n_items'])" "$DATE" 2>/dev/null || echo "?")
          git commit -m "snapshot ${DATE} (${ITEMS} items)"
          # Retry-on-conflict push: rebase if remote moved
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push failed, attempt $i — rebasing"
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          echo "all push attempts failed"
          exit 1

  analyze:
    needs: ingest
    # Run if ingest succeeded OR was deliberately skipped via workflow_dispatch.
    # `if: always()` ensures this evaluates regardless of the ingest job state.
    if: ${{ always() && inputs.skip_analyze != true && (needs.ingest.result == 'success' || needs.ingest.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write   # required by claude-code-action@v1 OIDC auth

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest snapshot/briefings just committed by ingest
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Verify CLAUDE_CODE_OAUTH_TOKEN is set
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repo secret is missing."
            echo "Setup: run 'claude setup-token' locally, then paste the value at"
            echo "  Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "  Name: CLAUDE_CODE_OAUTH_TOKEN"
            exit 1
          fi

      - name: Install jsonschema (agent uses it in-prompt to validate before commit)
        run: pip install jsonschema

      - name: Load daily-analysis prompt
        id: load_analysis_prompt
        run: |
          {
            echo 'content<<__PROMPT_EOF__'
            cat .claude/prompts/daily_analysis.md
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code daily framing analysis
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --permission-mode bypassPermissions
          show_full_output: true
          prompt: ${{ steps.load_analysis_prompt.outputs.content }}
        # Agent commits its own JSON outputs (per the prompt's final step).
        # claude-code-action sandboxes filesystem writes, so an external
        # commit step would see a clean working tree. Phase 0 fix.

      - name: Pull agent's analysis commits
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Re-authenticate git (claude-code-action revoked its token at session end)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # claude-code-action's post-step DELETEs its installation token
          # for security. The leftover http.extraheader in .git/config now
          # references a revoked token, so any subsequent `git push` fails
          # with "Invalid username or token. Password authentication is
          # not supported for Git operations." Re-set the auth header to
          # use the workflow's GITHUB_TOKEN, which lives until job end.
          git config --local --unset-all http.https://github.com/.extraheader || true
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${AUTH}"

      - name: Re-stamp meta_version on analyses (in case agent copied briefing pin)
        run: python -m analytical.restamp_analyses
        # Defense in depth. Agents have historically copied
        # briefing.meta_version (which preserves the pin from when the
        # briefing was generated, e.g. 1.0.0) instead of the current pin.
        # This script forces every today-dated analysis JSON to carry
        # meta.VERSION (read from meta_version.json). Idempotent.

      - name: Validate analyses (citation grounding + number reconciliation)
        run: python -m analytical.validate_analysis
        # Fails the job if any analysis JSON has hallucinated quotes,
        # bucket mismatches, or numbers that don't match metrics.json.
        # Defense in depth — the agent also runs schema validation
        # before its own commit per the prompt.

      - name: Render analysis markdown from JSON
        run: python -m publication.render_analysis_md
        # Reads analyses/<date>_<story>.json (canonical, from agent),
        # writes analyses/<date>_<story>.md (presentation layer).
        # Idempotent: re-runs against the same JSON produce identical MD.

      - name: Commit and push rendered markdown
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add analyses/
          if git diff --cached --quiet; then
            echo "No new MD to commit (agent may have produced no qualifying stories)."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          N=$(ls analyses/${DATE}_*.md 2>/dev/null | wc -l | tr -d ' ')
          git commit -m "render analyses ${DATE} markdown (${N} files)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          exit 1

  draft:
    needs: analyze
    if: ${{ always() && inputs.skip_draft != true && (needs.analyze.result == 'success' || needs.analyze.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write   # required by claude-code-action@v1 OIDC auth

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest analyses just committed by analyze
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Verify CLAUDE_CODE_OAUTH_TOKEN is set
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repo secret is missing."
            exit 1
          fi

      - name: Install jsonschema (for renderers + agent in-prompt validation)
        run: pip install jsonschema

      # Phase 3: thread + carousel are deterministic templates over the
      # canonical analysis JSON. No LLM required — saves ~8 messages/day.
      - name: Render thread drafts (template)
        run: python -m publication.render_thread

      - name: Render carousel drafts (template)
        run: python -m publication.render_carousel

      - name: Commit and push template-rendered drafts
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add drafts/
          if git diff --cached --quiet; then
            echo "No template-rendered drafts to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            N=$(ls drafts/${DATE}_*_thread.json drafts/${DATE}_*_carousel.json 2>/dev/null | wc -l | tr -d ' ')
            git commit -m "drafts ${DATE} thread+carousel (${N} files, template)"
            for i in 1 2 3; do
              if git push; then break; fi
              git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
            done
          fi

      # Long-form remains an LLM call — prose can't be templated.
      # Switched to Sonnet (per user decision Phase 1): faster than opus,
      # smarter than haiku, and the right tier for prose-grade output.
      - name: Load long-draft prompt
        id: load_long_prompt
        run: |
          {
            echo 'content<<__PROMPT_EOF__'
            cat .claude/prompts/draft_long.md
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Draft long-form posts (Sonnet, agent commits)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --permission-mode bypassPermissions
          show_full_output: true
          prompt: ${{ steps.load_long_prompt.outputs.content }}

      - name: Validate drafts against schemas
        run: |
          set -e
          pip install jsonschema >/dev/null
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          import jsonschema
          schemas = {
              "thread":   json.load(open("docs/api/schema/thread.schema.json")),
              "carousel": json.load(open("docs/api/schema/carousel.schema.json")),
              "long":     json.load(open("docs/api/schema/long.schema.json")),
          }
          fails = 0
          for p in sorted(Path("drafts").glob("*.json")):
              fmt = p.stem.rsplit("_", 1)[-1]
              if fmt not in schemas:
                  continue
              try:
                  jsonschema.validate(json.load(open(p)), schemas[fmt])
              except jsonschema.ValidationError as e:
                  print(f"::error file={p}::schema fail: {e.message}")
                  fails += 1
          sys.exit(fails)
          PY

      # Note: each of the three draft sub-actions commits + pushes its own
      # outputs (per its prompt). The external "Commit and push drafts" step
      # was removed in Phase 0 — same sandbox issue as the analyze job.
      # Schema validation above runs post-hoc; if it fails, the workflow
      # fails but the drafts are already on main. Self-correcting on next
      # run via the date filter.

  publish_api:
    needs: draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy from main — feature branches build the api/ tree but
    # don't push to Pages. Override via workflow_dispatch if needed.
    # Tolerate skipped upstream when the user manually skipped earlier jobs.
    if: ${{ always() && (needs.draft.result == 'success' || needs.draft.result == 'skipped') && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest drafts just committed
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build api/ tree
        run: python -m publication.build_index

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: api

      - id: deployment
        uses: actions/deploy-pages@v4
