name: Daily Epistemic Lens

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC every day
  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip ingest (use existing snapshot/briefings on main). Re-runs analyze/draft against existing data; saves ~10 min and 235 feed pulls.'
        type: boolean
        default: false
      skip_analyze:
        description: 'Skip analyze (LLM call to write analyses). Use when analyses already exist on main and you only want to re-run draft + publish_api.'
        type: boolean
        default: false
      skip_draft:
        description: 'Skip draft (long-form LLM call + thread/carousel template). Use when only publish_api needs to re-run (e.g. to redeploy web/ assets).'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    if: ${{ inputs.skip_ingest != true }}
    runs-on: ubuntu-latest
    # 60 min: extract ~7 + e5-large encode of ~6,500 articles ~25-30 +
    # cluster/salience/build/metrics ~10. ~45-50 min typical, 60 for headroom.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the bot can rebase before push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache embedding model (multilingual-e5-large ~2GB)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch/sentence_transformers
          key: hf-multilingual-e5-large-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify methodology pin is clean (defensive)
        # meta-check.yml already runs this on PRs, but a direct push or a
        # rebase-merge can land an unvalidated meta_version.json on main.
        # Catch it here so the cron alerts loudly rather than silently
        # producing artefacts stamped with a drifted pin.
        run: python scripts/baseline_pin.py --check

      - name: Pull feeds
        env:
          MAX_ITEMS: '50'
          MAX_WORKERS: '30'
          PER_HOST_DELAY: '1.0'
          FETCH_TIMEOUT: '20'
          # v10 clustering runs off core.embed.encode + core.cluster.cluster_daily.
          # pull_feeds' legacy MiniLM embed + HDBSCAN + convergence/similarity is
          # v9 dead weight — skip it (saves a model load + ~3 min).
          SKIP_EMBED: '1'
        run: python -m core.ingest.pull_feeds

      - name: Extract full article text (hybrid — clusters + per-feed coverage)
        env:
          TOP_CLUSTERS: '20'        # top-20 cross-country stories: deep coverage
          MAX_PER_FEED: '3'         # +3 items from EVERY feed: guarantees per-country coverage
          MAX_BODY_CHARS: '4000'
          EXTRACT_WORKERS: '20'
          PER_HOST_DELAY: '1.0'
          EXTRACT_TIMEOUT: '15'
        run: python -m core.ingest.extract_bodies

      - name: Deduplicate snapshot
        run: python -m core.ingest.dedup

      - name: Coverage matrix (deterministic per-story × per-feed coverage product, Phase 1)
        run: python -m core.ingest.coverage_matrix

      - name: Daily health snapshot
        run: python -m core.ingest.health

      - name: Embed every article (clustering cache)
        # Writes data/snapshots/<DATE>_embeddings.npy + <DATE>_embedding_ids.json,
        # keyed by sha256(model_id|signal_text_version|feed|link) so bumping the
        # model OR signal_text_version invalidates the cache loudly. The .npy is
        # NOT committed; CI runners regenerate fresh each cron.
        #
        # Model: intfloat/multilingual-e5-large (1024-dim, ~2GB). Encoding the
        # full ~6,500-article day takes ~25-30 min on the 2-core ubuntu-latest
        # runner — the job's 60-min budget accounts for it. Override the model
        # for a faster run via the EMBEDDING_MODEL env var.
        run: python -m core.embed.encode

      - name: Cluster all articles via HDBSCAN (v10)
        # v10: open-world clustering replaces canonical-story matching.
        # Reads the embedding cache, runs HDBSCAN over EVERY article in
        # the day's set, writes data/snapshots/<DATE>_clusters.json with
        # ~50-200 clusters + their member article IDs, country/outlet/lang
        # distributions, and top tokens.
        run: python -m core.cluster.cluster_daily

      - name: Rank clusters by salience, pick top N for briefing
        # Score each cluster (article count × country spread × cross-
        # lingual bonus × stability) and select the top 15. Writes
        # data/snapshots/<DATE>_top_clusters.json — the input to
        # build_briefing.
        run: python -m core.cluster.salience --top-n 15

      - name: Build per-cluster briefings (outlet-level corpora)
        # For each top cluster, assemble a per-outlet corpus to
        # data/briefings/<DATE>_<lineage_id>.json. Lineage IDs persist
        # across days when the same articles re-cluster (≥30% Jaccard
        # overlap, computed weekly by core/cluster/lineage.py).
        run: python -m core.briefing.build

      - name: Compute cross-outlet metrics (LaBSE cosine + exclusive vocab)
        run: python -m core.metrics.cross_bucket

      - name: Within-language LLR distinctive vocab
        run: python -m core.metrics.within_language_llr

      - name: Within-language PMI/log-odds bigram associations
        run: python -m core.metrics.within_language_pmi

      - name: Job summary
        if: always()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "data/snapshots/${DATE}_health.json" ]; then
            python3 - <<PY >> $GITHUB_STEP_SUMMARY
          import json
          d = json.load(open("data/snapshots/${DATE}_health.json"))
          print(f"# Daily ingest — {d['date']}")
          print()
          print(f"- Feeds: **{d['n_feeds']}**")
          print(f"- Items: **{d['n_items']}**")
          print(f"- Errored feeds: **{d['n_errors']}**")
          print(f"- Stub-only feeds: **{d['n_stub_feeds']}**")
          print(f"- Slow feeds: **{d['n_slow_feeds']}**")
          et = d.get("extraction_totals") or {}
          if any(et.values()):
              print(f"- Full-text extraction: **{et.get('FULL',0)} FULL**, {et.get('PARTIAL',0)} PARTIAL, {et.get('ERROR',0)} ERROR ({d.get('extraction_full_pct',0)}% FULL)")
          if d['bucket_alerts']:
              print()
              print(f"### Bucket alerts ({len(d['bucket_alerts'])})")
              for a in d['bucket_alerts']:
                  if a.get('alert_type') == 'low_extraction':
                      print(f"- **{a['bucket']}**: low_extraction "
                            f"(full={a['full']}/{a['attempted']}={a['full_pct']}%, "
                            f"errors={a['errors']})")
                  else:
                      print(f"- **{a['bucket']}**: {a['now']} "
                            f"(avg7={a['avg7']}, -{a['drop_pct']}%)")
          PY
          fi

      - name: Commit and push snapshot
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add data/snapshots/ data/briefings/ data/coverage/ cross_day_dedup_state.json
          # data/archive/rollup/ only exists on weeks the rollup job ran. Conditional
          # add so a missing directory doesn't abort `set -e` and fail the
          # whole ingest job — that cascade was skipping analyze entirely
          # (analyze's `if:` requires needs.ingest.result in success/skipped).
          [ -d data/archive/rollup ] && git add data/archive/rollup/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          ITEMS=$(python3 -c "import json,sys; d=json.load(open(f'data/snapshots/{sys.argv[1]}_health.json')); print(d['n_items'])" "$DATE" 2>/dev/null || echo "?")
          git commit -m "snapshot ${DATE} (${ITEMS} items)"
          # Retry-on-conflict push: rebase if remote moved. After three
          # failed attempts the ingest job fails, and analyze gates on
          # `needs.ingest.result` so the entire downstream cascade
          # (analyze → render → draft → publish_api → distribute) is
          # skipped. Snapshots / briefings ARE still on disk; a manual
          # workflow_dispatch with skip_ingest=true on the next run can
          # pick them up.
          for i in 1 2 3; do
            if git push; then
              echo "::notice::snapshot ${DATE} pushed on attempt $i (${ITEMS} items)"
              exit 0
            fi
            echo "push failed, attempt $i — rebasing"
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          echo "::error::all push attempts failed for snapshot ${DATE}. Snapshots are still on the runner's disk; re-trigger via workflow_dispatch with skip_ingest=false once the conflict resolves."
          exit 1

  # ----------------------------------------------------------------------
  # Analyze: per-story matrix.
  #
  # Pre-meta-v8.8.0 this was one monolithic job: daily_analysis →
  # headline_analysis → source_attribution → render, all sequential,
  # all loading every story into one Sonnet session, sharing one 60-min
  # budget. On 2026-05-19 the daily_analysis pass OOM'd context, lost
  # working state across auto-compaction, burned the remaining ~44 min on
  # citation-error retry loops, and the workflow cancelled before
  # headline / sources / render ever ran.
  #
  # Restructure (meta-v8.8.0): four jobs.
  #
  #   analyze_bootstrap → emits matrix story list (n_buckets >= 3)
  #   analyze_body      → matrix per story; daily_analysis Sonnet pass
  #   analyze_headline  → matrix per story; headline Sonnet pass
  #   analyze_sources   → matrix per story; source-attribution Sonnet pass
  #   analyze_render    → Python post-processing + commit + push
  #
  # Each Sonnet session loads ONE briefing instead of N → context
  # compaction doesn't fire. Per-story budgets ≤ 25 min (vs shared 60).
  # `fail-fast: false` on matrices means one story's regression doesn't
  # cancel siblings. Headline + sources run in parallel after body, each
  # gated on the per-story body file existing.
  #
  # `draft` (formerly needs: analyze) now needs: analyze_render.
  # ----------------------------------------------------------------------

  analyze_bootstrap:
    needs: ingest
    if: ${{ always() && inputs.skip_analyze != true && (needs.ingest.result == 'success' || needs.ingest.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      lineages: ${{ steps.list.outputs.lineages }}
      n_lineages: ${{ steps.list.outputs.n_lineages }}
      date: ${{ steps.list.outputs.date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest snapshot/briefings just committed by ingest
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps (meta imports regex)
        run: pip install jsonschema regex

      - name: List qualifying lineages (n_outlets >= 3) for the matrix
        id: list
        run: |
          DATE=$(date -u +%Y-%m-%d)
          LINEAGES=$(python -m core.briefing.qualifying --date "$DATE")
          N=$(python3 -c 'import json,sys; print(len(json.loads(sys.argv[1])))' "$LINEAGES")
          echo "lineages=$LINEAGES" >> "$GITHUB_OUTPUT"
          echo "n_lineages=$N" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Qualifying lineages for $DATE: $LINEAGES (n=$N)"

  analyze_body:
    needs: analyze_bootstrap
    if: ${{ always() && needs.analyze_bootstrap.result == 'success' && needs.analyze_bootstrap.outputs.n_lineages != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        lineage: ${{ fromJSON(needs.analyze_bootstrap.outputs.lineages) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest (other matrix entries may have committed already)
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Verify CLAUDE_CODE_OAUTH_TOKEN is set
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repo secret is missing."
            exit 1
          fi

      - name: Install jsonschema + regex
        run: pip install jsonschema regex

      - name: Load + scope daily-analysis prompt (cluster=${{ matrix.lineage }})
        id: load_prompt
        env:
          LINEAGE: ${{ matrix.lineage }}
        run: |
          {
            echo 'content<<__PROMPT_EOF__'
            echo "# Assigned cluster: ${LINEAGE}"
            echo ""
            echo "Process ONLY the cluster \`${LINEAGE}\` from today's briefings."
            echo "Do not enumerate other stories. Your output is a single file:"
            echo "\`data/analyses/<DATE>_${LINEAGE}.json\`."
            echo ""
            cat core/analyze/prompts/daily_analysis.md
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code daily framing analysis (cluster=${{ matrix.lineage }})
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --permission-mode bypassPermissions
          show_full_output: true
          prompt: ${{ steps.load_prompt.outputs.content }}

      - name: Pull agent's commit + re-authenticate git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true
          # claude-code-action's post-step deletes its installation token;
          # re-set the http.extraheader to the workflow's GITHUB_TOKEN so
          # any subsequent push in this job uses a still-valid auth header.
          git config --local --unset-all http.https://github.com/.extraheader || true
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${AUTH}"

  analyze_headline:
    needs: [analyze_bootstrap, analyze_body]
    # `always()` so a sibling story's body failure doesn't cancel this matrix
    # entry — each entry checks its OWN body file before running. Combined
    # with fail-fast: false on analyze_body, that gives per-story isolation.
    if: ${{ always() && needs.analyze_bootstrap.outputs.n_lineages != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        lineage: ${{ fromJSON(needs.analyze_bootstrap.outputs.lineages) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest (includes all body-pass commits)
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Check that body analysis exists for this story
        id: check
        env:
          LINEAGE: ${{ matrix.lineage }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "data/analyses/${DATE}_${LINEAGE}.json" ]; then
            echo "has_body=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::body analysis missing for ${LINEAGE}; skipping headline pass"
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jsonschema + regex
        if: steps.check.outputs.has_body == 'true'
        run: pip install jsonschema regex

      - name: Load + scope headline prompt (cluster=${{ matrix.lineage }})
        if: steps.check.outputs.has_body == 'true'
        id: load_prompt
        env:
          LINEAGE: ${{ matrix.lineage }}
        run: |
          {
            echo 'content<<__PROMPT_EOF__'
            echo "# Assigned cluster: ${LINEAGE}"
            echo ""
            echo "Process ONLY the cluster \`${LINEAGE}\`. Output:"
            echo "\`data/analyses/<DATE>_${LINEAGE}_headline.json\`."
            echo ""
            cat core/analyze/prompts/headline_analysis.md
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code headline analysis (cluster=${{ matrix.lineage }})
        if: steps.check.outputs.has_body == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --permission-mode bypassPermissions
          show_full_output: true
          prompt: ${{ steps.load_prompt.outputs.content }}

      - name: Pull + re-authenticate git
        if: steps.check.outputs.has_body == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git config --local --unset-all http.https://github.com/.extraheader || true
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${AUTH}"

  analyze_sources:
    needs: [analyze_bootstrap, analyze_body]
    # Same shape + dependency logic as analyze_headline. Headline + sources
    # can run in parallel once their per-story body file lands.
    if: ${{ always() && needs.analyze_bootstrap.outputs.n_lineages != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        lineage: ${{ fromJSON(needs.analyze_bootstrap.outputs.lineages) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest (includes all body-pass commits)
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Check that body analysis exists for this story
        id: check
        env:
          LINEAGE: ${{ matrix.lineage }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "data/analyses/${DATE}_${LINEAGE}.json" ]; then
            echo "has_body=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::body analysis missing for ${LINEAGE}; skipping source-attribution pass"
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jsonschema + regex
        if: steps.check.outputs.has_body == 'true'
        run: pip install jsonschema regex

      - name: Load + scope source-attribution prompt (cluster=${{ matrix.lineage }})
        if: steps.check.outputs.has_body == 'true'
        id: load_prompt
        env:
          LINEAGE: ${{ matrix.lineage }}
        run: |
          {
            echo 'content<<__PROMPT_EOF__'
            echo "# Assigned cluster: ${LINEAGE}"
            echo ""
            echo "Process ONLY the cluster \`${LINEAGE}\`. Output:"
            echo "\`sources/<DATE>_${LINEAGE}.json\`."
            echo ""
            cat core/analyze/prompts/source_attribution.md
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code source attribution (cluster=${{ matrix.lineage }})
        if: steps.check.outputs.has_body == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --permission-mode bypassPermissions
          show_full_output: true
          prompt: ${{ steps.load_prompt.outputs.content }}

      - name: Pull + re-authenticate git
        if: steps.check.outputs.has_body == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git config --local --unset-all http.https://github.com/.extraheader || true
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${AUTH}"

  analyze_render:
    needs: [analyze_bootstrap, analyze_body, analyze_headline, analyze_sources]
    # always() — render runs even if some matrix entries failed, so the
    # successful stories still get rendered + committed. validate_analysis,
    # render_*, longitudinal, robustness_check are all idempotent against
    # partial data.
    if: ${{ always() && needs.analyze_bootstrap.outputs.n_lineages != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest (all matrix commits should be on main by now)
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        # render_analysis_md etc import sentence-transformers transitively
        # via meta.py's pin checks. Full requirements.txt avoids surprise
        # ImportErrors in render-time helpers.
        run: pip install -r requirements.txt

      - name: Re-stamp meta_version on today's analyses
        run: python -m core.analyze.restamp

      - name: Validate analyses (citation grounding + number reconciliation)
        # Idempotent. Skips files that don't exist. Fails the job only on
        # genuine grounding errors in the files that DO exist.
        run: python -m core.analyze.validate

      - name: Augment metrics with weighted_frame_distribution
        # Folds analysis frames back into matching _metrics.json so renderer
        # / consumers see the population-weighted view as a first-class field.
        # Added meta-v8.8.0.
        run: python -m core.metrics.cross_bucket --augment-from-analysis

      - name: Headline-body divergence (sensationalism index)
        # Skips silently when a story is missing one of (body, headline).
        run: python -m core.analyze.divergence

      - name: Source aggregation (daily rollup per outlet/region)
        run: python -m core.compare.source_aggregation

      - name: Render sources markdown
        run: python -m publish.render.sources_md

      - name: Render analysis markdown from JSON
        run: python -m publish.render.analysis_md

      - name: Longitudinal aggregator (frame-share trajectories per story)
        run: python -m core.compare.longitudinal

      - name: Robustness check (frame-allocation stability per story)
        run: python -m core.compare.robustness

      - name: Commit and push rendered markdown + trajectories
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add data/analyses/ data/trajectory/ data/sources/ data/robustness/ data/briefings/
          if git diff --cached --quiet; then
            echo "No new MD or trajectory to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          N=$(ls data/analyses/${DATE}_*.md 2>/dev/null | wc -l | tr -d ' ')
          git commit -m "render analyses ${DATE} markdown (${N} files) + trajectories"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          exit 1

  draft:
    needs: analyze_render
    if: ${{ always() && inputs.skip_draft != true && (needs.analyze_render.result == 'success' || needs.analyze_render.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write   # required by claude-code-action@v1 OIDC auth

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest analyses just committed by analyze
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Verify CLAUDE_CODE_OAUTH_TOKEN is set
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repo secret is missing."
            exit 1
          fi

      - name: Install jsonschema + regex (renderers import meta which needs both)
        # regex is required because meta.py's tokenizer uses \p{L} Unicode
        # property escapes that stdlib `re` cannot compile.
        run: pip install jsonschema regex

      # Phase 3: thread + carousel are deterministic templates over the
      # canonical analysis JSON. No LLM required — saves ~8 messages/day.
      - name: Render thread drafts (template)
        run: python -m publish.render.thread

      - name: Render carousel drafts (template)
        run: python -m publish.render.carousel

      - name: Commit and push template-rendered drafts
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add data/drafts/
          if git diff --cached --quiet; then
            echo "No template-rendered drafts to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            N=$(ls drafts/${DATE}_*_thread.json drafts/${DATE}_*_carousel.json 2>/dev/null | wc -l | tr -d ' ')
            git commit -m "drafts ${DATE} thread+carousel (${N} files, template)"
            for i in 1 2 3; do
              if git push; then break; fi
              git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
            done
          fi

      # Long-form remains an LLM call — prose can't be templated.
      # Switched to Sonnet (per user decision Phase 1): faster than opus,
      # smarter than haiku, and the right tier for prose-grade output.
      - name: Load long-draft prompt
        id: load_long_prompt
        run: |
          {
            echo 'content<<__PROMPT_EOF__'
            cat publish/render/prompts/draft_long.md
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Draft long-form posts (Sonnet, agent commits)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6 --permission-mode bypassPermissions
          show_full_output: true
          prompt: ${{ steps.load_long_prompt.outputs.content }}

      - name: Stamp meta_version on any long-form drafts that lack it
        # The draft_long agent's prompt doesn't (and pre-8.7.2 couldn't)
        # reliably stamp meta_version into its JSON output. PR 1's
        # analytical/stamp_long_drafts.py exists specifically for this.
        # Pre-8.7.2 wasn't wired into the workflow → today's long drafts
        # land schema-noncompliant and the validator below trips on
        # `'meta_version' is a required property`. Wiring fixes that.
        run: python -m publish.render.stamp_long_drafts

      - name: Validate drafts against schemas
        run: |
          set -e
          pip install jsonschema >/dev/null
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          import jsonschema
          schemas = {
              "thread":   json.load(open("publish/api/schemas/thread.schema.json")),
              "carousel": json.load(open("publish/api/schemas/carousel.schema.json")),
              "long":     json.load(open("publish/api/schemas/long.schema.json")),
          }
          fails = 0
          for p in sorted(Path("drafts").glob("*.json")):
              fmt = p.stem.rsplit("_", 1)[-1]
              if fmt not in schemas:
                  continue
              try:
                  jsonschema.validate(json.load(open(p)), schemas[fmt])
              except jsonschema.ValidationError as e:
                  print(f"::error file={p}::schema fail: {e.message}")
                  fails += 1
          sys.exit(fails)
          PY

      # Note: each of the three draft sub-actions commits + pushes its own
      # outputs (per its prompt). The external "Commit and push drafts" step
      # was removed in Phase 0 — same sandbox issue as the analyze job.
      # Schema validation above runs post-hoc; if it fails, the workflow
      # fails but the drafts are already on main. Self-correcting on next
      # run via the date filter.

  publish_api:
    needs: draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy from main — feature branches build the api/ tree but
    # don't push to Pages. Override via workflow_dispatch if needed.
    # Tolerate skipped upstream when the user manually skipped earlier jobs.
    if: ${{ always() && (needs.draft.result == 'success' || needs.draft.result == 'skipped') && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest drafts just committed
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps (publish path needs playwright for PNG cards)
        run: pip install -r requirements.txt

      # PR D-2: cache the Playwright Chromium download (~112 MB). Cache
      # key is the playwright version pin so a bumped pin invalidates
      # the cache automatically. Without this, every cron tick redownloads.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium (cache miss only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Pull latest immediately before build (defensive)
        # 2026-05-19 deployed pages_build_version=ab5bea5 even though the
        # body-pass commit 09c686c had landed on main during analyze. The
        # job's earlier `git pull` (line ~544) ran ~minutes before this
        # build_index step; in the interim, the analyze_render commit may
        # have landed. Re-pull right before rendering so the api/ tree
        # reflects the freshest state on main.
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - name: Build api/ tree (renders HTML cards + PNGs)
        run: python -m publish.api.build_index

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: api

      - id: deployment
        uses: actions/deploy-pages@v4

  distribute:
    needs: publish_api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when publish_api succeeded (skipped is fine — distributing
    # yesterday's content is also OK on a re-run). Phase 2.
    if: ${{ always() && (needs.publish_api.result == 'success' || needs.publish_api.result == 'skipped') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest drafts + videos
        run: git pull --ff-only origin "$(git rev-parse --abbrev-ref HEAD)" || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: pip install -r requirements.txt

      # PR 6: distribution approval-gate. Cron no longer auto-fires the
      # X poster or YouTube Shorts uploader. Instead, today's drafts are
      # staged to distribution/pending/<date>/ as approval envelopes.
      # A separate workflow (or a human running
      # `python -m publish.distribute.publish --approve <id>`) moves an
      # envelope to distribution/approved/, where the actual posting
      # picks it up. Rationale in distribution/stage.py docstring +
      # docs/MERGE_PLAN.md PR 6.
      - name: Stage drafts to distribution/pending/
        run: python -m publish.distribute.stage

      - name: Commit pending envelopes
        run: |
          git add data/distribution_pending/ || true
          if ! git diff --cached --quiet; then
            git -c user.name="epistemic-lens-bot" \
                -c user.email="bot@epistemic-lens" \
              commit -m "distribution: stage $(date -u +%Y-%m-%d) drafts to pending/"
            git push || echo "(push failed; pending envelopes still on disk)"
          fi
