name: Weekly Analytics

# Weekly cadence for analyses that need accumulated history. Phase 2:
# cross-outlet lag (CCF) over the last 30+ days of coverage matrices. The
# script self-skips with `insufficient_history` until enough days have
# accumulated.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cross_outlet_lag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cross-outlet lag (CCF)
        run: python -m core.compare.lag

      - name: Wire baseline (Phase 4e) — rolling 90-day wire bigram corpus
        run: python -m core.compare.wire_baseline

      - name: Tilt index (Phase 4f) — per-outlet log-odds vs wire baseline
        run: python -m core.compare.tilt

      - name: Retention rollup (PR2 Phase B; bundles snapshots + briefings ≥90d old)
        # pipeline/rollup.py is idempotent — re-running on already-rolled
        # months is a no-op. Bundles old snapshots/briefings into
        # data/archive/rollup/<bucket>-YYYY-MM.tar.gz and removes the live
        # originals, keeping the working tree manageable. Without this
        # the repo bloats to 1-2 GB by year 2 and `git clone` becomes
        # painful (122 MB of unrolled snapshots/ as of 2026-05-12).
        run: python -m core.ingest.rollup --window-days 90

      - name: Persistent lineages (v10 — cross-day cluster tracking)
        # Walks the last 7 days of data/snapshots/<DATE>_clusters.json
        # (written daily by core.cluster.cluster_daily) and chains
        # clusters across days into lineages via member-article-ID
        # Jaccard overlap >=0.30. Member-ID overlap is invariant to
        # centroid drift; the same article-set re-clustering day-over-day
        # is real signal. Writes data/archive/persistent_lineages_<DATE>.json,
        # which core/briefing/build.py reads to reuse stable lineage_ids.
        run: python -m core.cluster.lineage || true

      - name: Commit + push lag/ + baseline/ + tilt/ + rollup + lineages
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add data/lag/ data/baseline/ data/tilt/
          # Conditional adds: data/archive/rollup/ exists only on weeks the
          # rollup actually had ≥90-day-old files to bundle, and the live
          # removals from snapshots/ and briefings/ may also be empty.
          [ -d data/archive/rollup ] && git add data/archive/rollup/ || true
          # Lineage output — explicit existence check so a silent failure
          # in the lineage step surfaces a CI warning rather than
          # vanishing into an empty `git add` glob.
          if [ -f "data/archive/persistent_lineages_${DATE}.json" ]; then
            git add "data/archive/persistent_lineages_${DATE}.json"
          else
            echo "::warning::lineage output missing for ${DATE}; check the lineage step (likely no <DATE>_clusters.json in the last 7 days)"
          fi
          git add -u data/snapshots/ data/briefings/ || true
          if git diff --cached --quiet; then
            echo "No weekly-analytics output changes to commit."
            exit 0
          fi
          git commit -m "weekly analytics ${DATE} (CCF + wire-baseline + tilt + rollup + lineages)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          exit 1
