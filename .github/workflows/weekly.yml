name: Weekly Analytics

# Weekly cadence for analyses that need accumulated history. Phase 2:
# cross-outlet lag (CCF) over the last 30+ days of coverage matrices. The
# script self-skips with `insufficient_history` until enough days have
# accumulated.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cross_outlet_lag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cross-outlet lag (CCF)
        run: python -m analytical.cross_outlet_lag

      - name: Wire baseline (Phase 4e) — rolling 90-day wire bigram corpus
        run: python -m analytical.wire_baseline

      - name: Tilt index (Phase 4f) — per-outlet log-odds vs wire baseline
        run: python -m analytical.tilt_index

      - name: Commit + push lag/ + baseline/ + tilt/
        run: |
          set -e
          git config user.name "epistemic-lens-bot"
          git config user.email "bot@epistemic-lens"
          git add lag/ baseline/ tilt/
          if git diff --cached --quiet; then
            echo "No weekly-analytics output changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "weekly analytics ${DATE} (CCF + wire-baseline + tilt)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          done
          exit 1
