name: Meta Pin

# These two checks are configured as REQUIRED in the branch ruleset.
# They MUST run on every push (no path filter) so the bot's data-only
# pushes (snapshots/, briefings/, analyses/, drafts/) satisfy the
# required-check rule. A path-filtered required check would silently
# block the bot's daily commits.
#
# The v10 unit suite (tests/tests.py + tests/tests_edge.py) is offline —
# no network, no embedding model — so it runs fast and unconditionally.

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  validate-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify meta_version.json hashes match pinned inputs
        run: python scripts/baseline_pin.py --check

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Lightweight deps only — embedding model not needed for unit tests.
      # regex: Unicode tokeniser; jsonschema: schema-validity checks.
      - name: Install minimal deps
        run: pip install requests regex jsonschema

      - name: Run unit + edge tests
        run: python -m unittest tests.tests tests.tests_edge -v
