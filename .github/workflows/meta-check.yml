name: Meta Pin

# Runs on EVERY push (no path filter) so the required `validate-meta`
# check is satisfied even when the bot commits pure data files
# (snapshots/, briefings/, analyses/, drafts/, baselines/, arcs/, cards/).
# A path-filtered job would never trigger on those pushes, the required
# check would never run, and the branch ruleset would reject the commit.
#
# This file is deliberately tiny + dependency-free so it runs in <15s
# per push. ci.yml still owns the heavier unit/edge/e2e suites.

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  validate-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify meta_version.json hashes match pinned inputs
        run: python baseline_pin.py --check
