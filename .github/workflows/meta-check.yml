name: Meta Pin

# These two checks are configured as REQUIRED in the branch ruleset.
# They MUST run on every push (no path filter) so the bot's data-only
# pushes (snapshots/, briefings/, analyses/, drafts/) satisfy the
# required-check rule. A path-filtered required check would silently
# block the bot's daily commits.
#
# Heavier jobs (e2e-smoke, etc.) live in ci.yml with their path filters;
# they are NOT required.

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  validate-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify meta_version.json hashes match pinned inputs
        run: python baseline_pin.py --check

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Lightweight deps only — embedding model not needed for unit tests.
      - name: Install minimal deps
        run: pip install requests

      - name: Run unit + edge tests
        run: python -m unittest tests tests_edge -v
